<style>
:root{--cb:#07456C;--co:#D95727;--cs:#0E6AA6;--cy:#E6B800;--ca:#E59100;--gn:#0FA972;--rd:#E5384A;--bg:#EEF1F5;--c1:#FFFFFF;--c2:#F6F8FB;--c3:#E7ECF1;--bd:#D5DCE3;--bdh:#BFC8D1;--tx:#1B2733;--dm:#3F4D5C;--ch:#3A4856;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:12px}
.tn{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);box-shadow:0 1px 3px rgba(7,69,108,.06)}.tn-i{max-width:1600px;margin:0 auto;padding:0 12px;display:flex;align-items:center;height:42px;gap:8px}
.logo{display:flex;align-items:center;gap:6px;flex-shrink:0}.logo svg{height:24px}.logo span{font-size:9px;font-weight:700;color:var(--dm);letter-spacing:1px;line-height:1.1}.logo b{color:var(--cb);display:block;font-size:11px}

.ctag{background:var(--c1);border:1px solid var(--bd);border-radius:4px;padding:2px 6px;font-size:9px;color:var(--co);font-weight:700;flex-shrink:0}
.fb{background:var(--c2);border-bottom:1px solid var(--bd);padding:5px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fb label{font-size:9px;font-weight:800;color:var(--ch);text-transform:uppercase;letter-spacing:1px}
.yb{background:var(--c2);border:none;border-radius:4px;width:22px;height:22px;color:var(--tx);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}.yb:hover{background:var(--cb);color:#fff}
.yi{background:#fff;border:1px solid var(--bd);border-radius:4px;padding:2px 4px;color:var(--tx);font-family:inherit;font-size:10px;width:50px;text-align:center}.yi:focus{outline:none;border-color:var(--cs)}
.mr{display:flex;gap:2px;flex-wrap:wrap}
.mc{padding:2px 7px;border-radius:12px;font-size:9px;font-weight:700;cursor:pointer;background:rgba(0,0,0,.03);color:var(--dm);border:1px solid transparent;transition:.15s;user-select:none}.mc:hover{color:var(--tx);border-color:var(--bd)}.mc.s{background:var(--co);color:#fff;border-color:var(--co)}
.fa{margin-left:auto;display:flex;gap:3px}
.w{max-width:1600px;margin:0 auto;padding:8px 12px}.pg{display:none}.pg.on{display:block}
.cd{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:6px;overflow:hidden;box-shadow:0 1px 2px rgba(7,69,108,.04)}
.ct{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--cb);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.g{display:grid;gap:6px}.g5{grid-template-columns:repeat(5,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.kp{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:8px;box-shadow:0 1px 2px rgba(7,69,108,.04)}.kp .kl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--ch);font-weight:800}.kp .kv{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1.2}.kp .ks{font-size:9px;color:var(--dm)}.kp .kb{height:2px;background:rgba(0,0,0,.04);border-radius:1px;margin-top:4px;overflow:hidden}.kp .kf{height:100%;border-radius:1px;transition:width .8s}
.dt{width:100%;border-collapse:collapse;font-size:10px}.dt th{text-align:left;padding:4px 6px;font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.6px;color:var(--dm);border-bottom:1px solid var(--bd);background:var(--c3);color:var(--ch)}.dt td{padding:4px 6px;border-bottom:1px solid rgba(0,0,0,.02)}.dt tr:hover td{background:rgba(14,106,166,.06)}
.bg{padding:1px 6px;border-radius:10px;font-size:8px;font-weight:700;display:inline-block}.bg.ok{background:rgba(0,196,140,.12);color:var(--gn)}.bg.wn{background:rgba(255,173,0,.12);color:var(--ca)}.bg.cr{background:rgba(255,71,87,.12);color:var(--rd)}.bg.in{background:rgba(0,173,249,.12);color:var(--cs)}
.gw{display:flex;flex-direction:column;align-items:center}.gw svg{width:100px;height:62px}.gw .gv{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-top:-2px}.gw .gl{font-size:8px;color:var(--dm);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
input[type="text"],input[type="number"],input[type="date"],select,textarea{background:#fff;border:1px solid var(--bd);border-radius:4px;padding:4px 6px;color:var(--tx);font-family:inherit;font-size:10px;width:100%}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cs)}
.fl{font-size:9px;font-weight:800;color:var(--ch);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}.fg{margin-bottom:6px}
.btn{padding:4px 10px;border-radius:4px;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;border:none;transition:.2s;display:inline-flex;align-items:center;gap:3px}.bp{background:var(--cb);color:#fff}.bp:hover{background:#0a5a8a}.bo{background:var(--co);color:#fff}.bs{background:rgba(0,0,0,.06);color:var(--tx);border:1px solid var(--bd)}.bsm{padding:3px 6px;font-size:9px}
.st{display:flex;gap:2px;margin-bottom:8px;background:var(--c3);border-radius:5px;padding:2px}.stb{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;color:var(--dm);transition:.2s;flex:1;text-align:center}.stb.av{background:var(--co);color:#fff}.stb.ac{background:var(--cb);color:#fff}
.sp{display:none}.sp.on{display:block}
.pr{cursor:pointer;transition:all .15s;padding:2px 0;border-bottom:1px solid rgba(0,0,0,.02)}.pr:hover{background:rgba(14,106,166,.06)}.pr-r{display:flex;align-items:center;gap:6px}.pr-l{width:120px;font-size:9px;color:var(--dm);text-align:right;flex-shrink:0}.pr-t{flex:1;height:14px;background:rgba(0,0,0,.02);border-radius:2px;overflow:hidden}.pr-f{height:100%;border-radius:2px;transition:width .8s;display:flex;align-items:center;justify-content:flex-end;padding-right:3px;font-size:7px;font-weight:800;color:#fff}.pr-v{width:30px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pr-exp{display:none;padding:2px 0 2px 128px;font-size:9px}.pr-exp.show{display:block}.pr-det{padding:2px 6px;border-left:2px solid var(--bd);margin-bottom:1px;color:var(--dm)}.pr-det b{color:var(--tx)}
.bars{display:flex;gap:3px;align-items:flex-end;height:100px}.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}.bw{width:100%;display:flex;gap:2px;align-items:flex-end;justify-content:center;height:80px}.bc{width:14px;border-radius:2px 2px 0 0;transition:height .8s;min-height:1px}.bl{font-size:7px;color:var(--dm);font-weight:600}
.vc{background:linear-gradient(135deg,rgba(7,69,108,.1),rgba(0,196,140,.05));border:1px solid rgba(7,69,108,.2);border-radius:var(--r);padding:12px;text-align:center}.vc .vn{font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--cs)}.vc .vu{font-size:10px;color:var(--tx);font-weight:600}.vc .vl{font-size:8px;color:var(--dm);text-transform:uppercase;letter-spacing:1px}
.bm-table{width:100%;border-collapse:collapse;font-size:9px}.bm-table th{padding:3px 4px;font-size:7px;text-transform:uppercase;letter-spacing:.4px;color:var(--dm);border:1px solid var(--bd);background:rgba(0,0,0,.2);font-weight:700;text-align:center;white-space:nowrap}.bm-table td{padding:3px 4px;border:1px solid rgba(0,0,0,.04);text-align:right}.bm-table td:nth-child(1),.bm-table td:nth-child(2){text-align:left}.bm-table tr:hover td{background:rgba(14,106,166,.06)}

.rdc-det.show{display:block!important}
.gdet.show{display:block!important}

.coll-body{transition:max-height .3s ease;overflow:hidden}
.coll-body.collapsed{max-height:0!important;padding:0!important;margin:0!important;overflow:hidden}
.coll-icon{transition:transform .2s;display:inline-block;font-size:10px}

.cd.fullscreen{position:fixed!important;top:0!important;left:0!important;right:0!important;bottom:0!important;z-index:9999!important;margin:0!important;border-radius:0!important;overflow-y:auto!important;max-height:100vh!important;width:100vw!important;padding:16px!important;background:var(--c1)!important;box-shadow:0 0 0 9999px rgba(0,0,0,.85)!important}

.cd.fullscreen .fs-btn::after{content:'✕ Fechar'}

.fs-btn{position:absolute;top:4px;right:4px;background:rgba(0,173,249,.15);border:1px solid rgba(0,173,249,.3);color:var(--cs);font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;cursor:pointer;z-index:10}
.fs-btn:hover{background:rgba(0,173,249,.3)}
.fs-btn::after{content:'⛶ Expandir'}
.ph-items.show{display:block!important}
.gantt-row:hover{background:rgba(14,106,166,.06)}
.dev-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.03)}.dev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}.dev-name{flex:1;font-size:10px}.dev-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px}
.drop-zone{border:2px dashed var(--bd);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:.3s;color:var(--dm)}.drop-zone:hover,.drop-zone.dragover{border-color:var(--cs);background:rgba(14,106,166,.06)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

function processFile(file, type){
if(!file) return;
const reader = new FileReader();
reader.onload = function(e){
  try{
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {header:1});
    
    if(type==='pontos'){
      // Find header row
      let hdr=-1;
      for(let i=0;i<Math.min(5,json.length);i++){
        const row=json[i];
        if(row && row.some(c=>String(c).toUpperCase().includes('MATRICULA'))){hdr=i;break}
      }
      if(hdr<0){document.getElementById('pontoResult').innerHTML='<div style="color:var(--rd);font-size:10px;margin-top:4px">⚠ Header não encontrado</div>';return}
      
      const rows=json.slice(hdr+1).filter(r=>r[1]);
      const employees={};
      rows.forEach(r=>{
        const mat=String(r[1]||'').trim();if(!mat)return;
        const nome=String(r[2]||'');const func=String(r[3]||'');
        const parseH=v=>{if(!v)return 0;const s=String(v);const p=s.split(':');if(p.length===2)return parseInt(p[0])+(parseInt(p[1])||0)/60;if(typeof v==='number')return v*24;return 0};
        if(!employees[mat])employees[mat]={mat,nome,func,hn:0,he:0,adn:0,dias:0};
        employees[mat].hn+=parseH(r[6]);employees[mat].he+=parseH(r[7])+parseH(r[8])+parseH(r[9]);
        employees[mat].adn+=parseH(r[10]);employees[mat].dias++;
      });
      
      const emps=Object.values(employees);
      const matched=emps.filter(e=>EF.some(ef=>ef.m===e.mat));
      const unmatched=emps.filter(e=>!EF.some(ef=>ef.m===e.mat));
      
      document.getElementById('pontoResult').innerHTML=`
      <div style="margin-top:6px;padding:8px;background:rgba(0,196,140,.06);border:1px solid rgba(0,196,140,.15);border-radius:6px">
        <div style="font-size:11px;font-weight:700;color:var(--gn);margin-bottom:4px">✓ ${file.name} processado com sucesso</div>
        <div style="font-size:10px;color:var(--tx)">${rows.length} registros · ${emps.length} funcionários · ${matched.length} vinculados ao contrato · ${unmatched.length} sem vínculo</div>
        <div style="font-size:9px;color:var(--dm);margin-top:4px">Total HN: ${fm(emps.reduce((s,e)=>s+e.hn,0))}h | HE: ${fd(emps.reduce((s,e)=>s+e.he,0),1)}h | ADN: ${fd(emps.reduce((s,e)=>s+e.adn,0),1)}h</div>
      </div>`;
      
      // Show processed data
      document.getElementById('processResult').innerHTML=`
      <div style="font-size:10px;font-weight:700;color:var(--cs);margin-bottom:4px">Dados PONTOS processados — prontos para conversão</div>
      <div style="max-height:200px;overflow-y:auto"><table class="dt"><thead><tr><th>Mat</th><th>Nome</th><th>Função</th><th>HN</th><th>HE</th><th>ADN</th><th>Dias</th><th>Status</th></tr></thead><tbody>
      ${emps.slice(0,50).map(e=>`<tr><td style="font-family:'JetBrains Mono';font-size:8px">${e.mat}</td><td>${e.nome.substring(0,30)}</td><td style="font-size:9px">${e.func}</td><td>${fd(e.hn,1)}</td><td>${fd(e.he,1)}</td><td>${fd(e.adn,1)}</td><td>${e.dias}</td><td>${EF.some(ef=>ef.m===e.mat)?'<span class="bg ok">OK</span>':'<span class="bg cr">N/C</span>'}</td></tr>`).join('')}
      </tbody></table></div>`;
      toast(emps.length+' funcionários processados!');
      // AUTO-UPDATE: atualizar EF com horas do PONTOS
      emps.forEach(function(ep){
        var ef=EF.find(function(x){return x.m===ep.mat});
        if(ef){ef.hn=Math.round(ep.hn*10)/10;ef.he=Math.round(ep.he*10)/10;ef.adn=Math.round(ep.adn*10)/10;ef.di=ep.dias}
      });
      persistAll();
      logAudit('Espelho Ponto','Upload',file.name+': '+emps.length+' funcionários');
    }
    else if(type==='template'){
      const rows=json.slice(1).filter(r=>r[1]);
      const byFrente={};
      rows.forEach(r=>{const fr=String(r[0]||'MOI');if(!byFrente[fr])byFrente[fr]=[];byFrente[fr].push({mat:String(r[1]||''),nome:String(r[2]||''),ini:r[3],fim:r[4],hv:r[5]})});
      document.getElementById('templateResult').innerHTML=`
      <div style="margin-top:6px;padding:8px;background:rgba(255,173,0,.06);border:1px solid rgba(255,173,0,.15);border-radius:6px">
        <div style="font-size:11px;font-weight:700;color:var(--ca);margin-bottom:4px">✓ ${file.name} processado</div>
        <div style="font-size:10px">${rows.length} registros · ${Object.keys(byFrente).length} frentes de serviço</div>
        <div style="font-size:9px;color:var(--dm);margin-top:4px">Frentes: ${Object.entries(byFrente).map(([f,r])=>`${f}(${r.length})`).join(' · ')}</div>
      </div>`;
      toast(`Template MO processado!`);
    }
  }catch(err){
    document.getElementById(type==='pontos'?'pontoResult':'templateResult').innerHTML=`<div style="color:var(--rd);font-size:10px;margin-top:4px">⚠ Erro: ${err.message}</div>`;
  }
};
reader.readAsArrayBuffer(file);
}

// ===== PLANEJAMENTO =====
// CFG global — compartilhado entre Motor, Simulador, recalcProd
let CFG={
  jornada:8.73, diasUteis:22,
  perdaPIN:35, perdaAND:20, perdaALP:30,
  prodPIN:0.8, prodAND:1.8, prodALP:1.5, // PIN: m²/hh real médio | AND: m³/hh (volume montado) | ALP: m²/hh
  unPIN:'m²/hh', unAND:'m³/hh', unALP:'m²/hh', // Unidades de medida por disciplina

  diasAND_mont:1.5, diasPIN:2.5, diasAND_desm:1.0
};
function renderPlan(){
// ========== MOTOR DE PLANEJAMENTO INTELIGENTE ==========
const eqMinTotal=CFG.eqPIN+CFG.eqAND+CFG.eqALP+CFG.eqTST+CFG.eqENC+CFG.eqSUP;
const efDisp={PIN:EF.filter(e=>e.d==='PIN').length,AND:EF.filter(e=>e.d==='AND').length,ALP:EF.filter(e=>e.d==='ALP').length,MEC:EF.filter(e=>e.d==='MEC').length,ADM:EF.filter(e=>e.d==='ADM').length};

// Frentes máximas POR DISCIPLINA (gargalo = menor)
const frentesPIN=Math.floor(efDisp.PIN/CFG.eqPIN); // 45/8 = 5
const frentesAND=Math.floor(efDisp.AND/CFG.eqAND); // 25/5 = 5
const frentesALP=Math.floor(efDisp.ALP/CFG.eqALP); // 7/2 = 3
const maxFrentes=Math.min(frentesPIN,frentesAND); // Gargalo sem alpinismo
const maxFrentesComALP=Math.min(frentesPIN,frentesAND,frentesALP);

// Capacidade HH POR DISCIPLINA (cada um no seu papel)
const capPIN_HH=efDisp.PIN*CFG.jornada*CFG.diasUteis*(1-CFG.perdaPIN/100);
const capAND_HH=efDisp.AND*CFG.jornada*CFG.diasUteis*(1-CFG.perdaAND/100);
const capALP_HH=efDisp.ALP*CFG.jornada*CFG.diasUteis*(1-CFG.perdaALP/100);

// Produção m² = SOMENTE PINTORES (AND e ALP não produzem m² de pintura)
const prodPIN_m2_mes=capPIN_HH*CFG.prodPIN;
const prodALP_m2_mes=capALP_HH*CFG.prodALP;

const tacAll=PARADAS.filter(p=>p.e==='TAC');
const today=(new Date(new Date().toDateString()));

// Análise mensal COM DISCIPLINAS SEPARADAS
const meses=[];
for(let m=1;m<=12;m++){
  const mp=tacAll.filter(p=>p.m===m);
  let maxSimult=0;
  mp.forEach((p1,i)=>{
    let simult=1;
    mp.forEach((p2,j)=>{if(i!==j&&new Date(p1.i)<=new Date(p2.f)&&new Date(p1.f)>=new Date(p2.i))simult++});
    maxSimult=Math.max(maxSimult,simult);
  });
  // Demanda HH por DISCIPLINA por parada
  // Numa parada de 120h: AND usa 1.5d mont + 1d desm = 2.5d; PIN usa 2.5d; overlap
  const demPIN=mp.length*CFG.eqPIN*CFG.diasPIN*CFG.jornada; // pintores × dias de pintura × jornada
  const demAND=mp.length*CFG.eqAND*(CFG.diasAND_mont+CFG.diasAND_desm)*CFG.jornada;
  const demALP=mp.length*CFG.eqALP*CFG.diasPIN*CFG.jornada*0.3; // alpinismo em ~30% das paradas
  
  const gapPIN=capPIN_HH-demPIN;
  const gapAND=capAND_HH-demAND;
  const utilPIN=capPIN_HH>0?Math.round(demPIN/capPIN_HH*100):0;
  const utilAND=capAND_HH>0?Math.round(demAND/capAND_HH*100):0;
  
  const frentesNec=maxSimult;

function recalcProd(){setTimeout(function(){persistKey(LS_KEYS.cfg,CFG)},200);
  // Read all editable productivity values
  const piSA25=parseFloat(document.getElementById('piSA25')?.value)||5.0;
  const piSA3=parseFloat(document.getElementById('piSA3')?.value)||3.0;
  const piPrimer=parseFloat(document.getElementById('piPrimer')?.value)||10.0;
  const piInterm=parseFloat(document.getElementById('piInterm')?.value)||12.0;
  const piAcab=parseFloat(document.getElementById('piAcab')?.value)||10.0;
  const piElast=parseFloat(document.getElementById('piElast')?.value)||4.0;
  const cicloInst=parseFloat(document.getElementById('piCiclo')?.value)||0.8;
  
  // AND values
  const piAndSimp=parseFloat(document.getElementById('piAndSimp')?.value)||20.0;
  const piAndComp=parseFloat(document.getElementById('piAndComp')?.value)||10.0;
  const piAndDesm=parseFloat(document.getElementById('piAndDesm')?.value)||25.0;
  
  // ALP values
  const piAlpInsp=parseFloat(document.getElementById('piAlpInsp')?.value)||40.0;
  const piAlpPint=parseFloat(document.getElementById('piAlpPint')?.value)||2.0;
  
  // Read all loss factors
  const perdas=[...document.querySelectorAll('.pi-perda')].map(el=>parseFloat(el.value)||0);
  const perdaTotal=perdas.reduce((s,v)=>s+v,0);
  const perdaCap=Math.min(perdaTotal,95);
  document.getElementById('perdaTotal').textContent=perdaCap+'%';
  
  // UPDATE CFG — this is the key connection
  CFG.prodPIN=cicloInst;
  CFG.perdaPIN=perdaCap;
  CFG.prodAND=(piAndSimp+piAndDesm)/2;
  CFG.prodALP=piAlpPint;
  
  const jornada=CFG.jornada;
  const diasUteis=CFG.diasUteis;
  const efProdCalc=EF.filter(e=>e.d==='PIN').length;
  const efANDCalc=EF.filter(e=>e.d==='AND').length;
  const efALPCalc=EF.filter(e=>e.d==='ALP').length;
  
  // Calculated values
  const prodMediaDia=cicloInst*jornada*(1-perdaCap/100);
  const prodEquipeDia=prodMediaDia*efProdCalc;
  const prodEquipeMes=prodEquipeDia*diasUteis;
  
  // AND capacity
  const andMediaDia=CFG.prodAND*jornada*(1-CFG.perdaAND/100);
  const andEquipeDia=andMediaDia*efANDCalc;
  
  // Frentes calculation
  const frentesPIN=Math.floor(efProdCalc/CFG.eqPIN);
  const frentesAND=Math.floor(efANDCalc/CFG.eqAND);
  const maxFrentes=Math.min(frentesPIN,frentesAND);
  
  // Real data comparison
  const prodRealDia=1915.43/(20*45);
  const aderencia=(prodRealDia/prodMediaDia*100);
  
  // Occupancy rates
  const occPIN=maxFrentes*CFG.eqPIN/efProdCalc*100;
  const occAND=maxFrentes*CFG.eqAND/efANDCalc*100;
  const occALP=efALPCalc>0?Math.min(100,maxFrentes*CFG.eqALP/efALPCalc*100):0;
  
  document.getElementById('prodResult').innerHTML=`
  <div class="kp" style="border-top:3px solid var(--ca)"><div class="kl">Prod. Instantânea</div><div class="kv" style="color:var(--ca);font-size:16px">${cicloInst.toFixed(1)}</div><div class="ks">m²/hh (média ciclo)</div></div>
  <div class="kp" style="border-top:3px solid var(--co)"><div class="kl">Prod. Média/Dia</div><div class="kv" style="color:var(--co);font-size:16px">${prodMediaDia.toFixed(1)}</div><div class="ks">m²/pintor-dia (−${perdaCap}% perdas)</div></div>
  <div class="kp" style="border-top:3px solid var(--cs)"><div class="kl">Capacidade/Mês</div><div class="kv" style="color:var(--cs);font-size:16px">${fm(prodEquipeMes)}</div><div class="ks">${efProdCalc} pintores × ${diasUteis} dias</div></div>
  <div class="kp" style="border-top:3px solid ${aderencia>=80?'var(--gn)':'var(--rd)'}"><div class="kl">Aderência vs Real</div><div class="kv" style="color:${aderencia>=80?'var(--gn)':'var(--rd)'};font-size:16px">${aderencia.toFixed(0)}%</div><div class="ks">Real: ${prodRealDia.toFixed(2)} m²/hd</div></div>
  `;
  
  // Show occupancy panel
  const occEl=document.getElementById('occResult');
  if(occEl){
    occEl.innerHTML=`
    <div class="kp"><div class="kl">Frentes Máx</div><div class="kv" style="color:var(--ca)">${maxFrentes}</div><div class="ks">MIN(PIN:${frentesPIN}, AND:${frentesAND})</div></div>
    <div class="kp"><div class="kl">Ocup. PIN</div><div class="kv" style="color:${occPIN>90?'var(--rd)':occPIN>70?'var(--ca)':'var(--gn)'}">${occPIN.toFixed(0)}%</div><div class="ks">${maxFrentes*CFG.eqPIN}/${efProdCalc} alocados</div></div>
    <div class="kp"><div class="kl">Ocup. AND</div><div class="kv" style="color:${occAND>90?'var(--rd)':occAND>70?'var(--ca)':'var(--gn)'}">${occAND.toFixed(0)}%</div><div class="ks">${maxFrentes*CFG.eqAND}/${efANDCalc} alocados</div></div>
    <div class="kp"><div class="kl">Ocup. ALP</div><div class="kv" style="color:${occALP>90?'var(--rd)':occALP>70?'var(--ca)':'var(--gn)'}">${occALP.toFixed(0)}%</div><div class="ks">${Math.min(maxFrentes*CFG.eqALP,efALPCalc)}/${efALPCalc} alocados</div></div>
    `;
  }
  
  // Update Simulador defaults to match new CFG
  const sP=document.getElementById('sP');if(sP)sP.value=CFG.prodPIN;
  const sL=document.getElementById('sL');if(sL)sL.value=CFG.perdaPIN;
  
  // Re-render Simulador and Gantt MO with new values
  try{rSim()}catch(e){}
  try{renderGanttMO()}catch(e){}
  
  toast('Índices recalculados! Motor, Simulador e Gantt atualizados.');
}

function swPlan(t,el){
const tabs=el.parentElement.children;
for(let i=0;i<tabs.length;i++){tabs[i].classList.remove('av','ac')}
el.classList.add(t==='motor'?'av':'ac');
const pm=document.getElementById('plMotor');
const pg=document.getElementById('plGanttMO');
const ps=document.getElementById('plSim');
if(pm)pm.style.display='none';
if(pg)pg.style.display='none';
if(ps)ps.style.display='none';

if(show)show.style.display='block';
}

function renderGanttMO(){
const el=document.getElementById('ganttMOArea');if(!el)return;
const tacAll=PARADAS.filter(p=>p.e==='TAC');
const today=(new Date(new Date().toDateString()));
const minD=new Date('2026-01-01'),maxD=new Date('2026-12-31');
const totalDays=365;const dayW=Math.max(2.5,900/totalDays);
const mDays=[31,28,31,30,31,30,31,31,30,31,30,31];
// equipe minima por frente = 16

// For each day, count how many paradas are active
const dailyLoad=new Array(366).fill(0);
tacAll.forEach(p=>{
  const s=Math.max(0,Math.ceil((new Date(p.i)-minD)/(864e5)));
  const e=Math.min(365,Math.ceil((new Date(p.f)-minD)/(864e5)));
  for(let d=s;d<=e;d++)dailyLoad[d]++;
});
const maxLoad=Math.max(...dailyLoad,1);
const maxFrentesG=Math.floor(77/16);

let html=`<div style="min-width:${totalDays*dayW+60}px">`;
// Month headers
html+=`<div style="display:flex;margin-left:60px">`;
MN.forEach((m,i)=>{html+=`<div style="width:${mDays[i]*dayW}px;text-align:center;font-size:7px;font-weight:700;color:var(--cs);border-bottom:1px solid var(--bd);padding:2px">${m}</div>`});
html+=`</div>`;
// Capacity line label
html+=`<div style="display:flex;align-items:center;height:120px;position:relative">`;
html+=`<div style="width:60px;font-size:7px;color:var(--dm);text-align:right;padding-right:4px;flex-shrink:0">Frentes<br>ativas</div>`;
html+=`<div style="flex:1;position:relative;height:100%">`;
// Capacity limit line
const capY=100-(maxFrentesG/Math.max(maxLoad,maxFrentesG+1))*100;
html+=`<div style="position:absolute;top:${capY}%;left:0;right:0;height:1px;background:var(--rd);opacity:.6;z-index:2"></div>`;
html+=`<div style="position:absolute;top:${capY-2}%;right:2px;font-size:6px;color:var(--rd);font-weight:700;z-index:3">Máx ${maxFrentesG} frentes</div>`;
// Today line
const todayOff=Math.ceil((today-minD)/(864e5));
html+=`<div style="position:absolute;left:${todayOff*dayW}px;top:0;bottom:0;width:1px;background:var(--rd);opacity:.4;z-index:2"></div>`;
// Bars (daily)
html+=`<div style="display:flex;align-items:flex-end;height:100%;gap:0">`;
for(let d=0;d<365;d++){
  const load=dailyLoad[d];
  const h=load>0?(load/Math.max(maxLoad,maxFrentesG+1))*95:0;
  const col=load>maxFrentesG?'var(--rd)':load>maxFrentesG*.7?'var(--ca)':load>0?'var(--cs)':'transparent';
  html+=`<div style="width:${dayW}px;height:${h}%;background:${col};opacity:.7;border-radius:1px 1px 0 0" title="Dia ${d+1}: ${load} frente(s)"></div>`;
}
html+=`</div></div></div>`;
html+=`<div style="display:flex;gap:12px;justify-content:center;margin-top:4px;font-size:8px"><span style="color:var(--cs)">■ Normal</span><span style="color:var(--ca)">■ Alto (>70%)</span><span style="color:var(--rd)">■ Acima Capacidade</span><span style="color:var(--rd)">— Limite ${maxFrentesG} frentes</span></div>`;
// Summary table
const mDaysA=[31,28,31,30,31,30,31,31,30,31,30,31];
let offset=0;
html+=`<div style="margin-top:8px;overflow-x:auto"><table class="dt"><thead><tr><th>Mês</th><th>Pico Frentes</th><th>Dias c/ Parada</th><th>Dias s/ Parada</th><th>Status</th></tr></thead><tbody>`;
for(let mi=0;mi<12;mi++){
  let pico=0,diasComParada=0;
  for(let d=0;d<mDaysA[mi];d++){
    const load=dailyLoad[offset+d]||0;
    if(load>pico)pico=load;
    if(load>0)diasComParada++;
  }
  const stCol=pico>maxFrentesG?'var(--rd)':pico>maxFrentesG*.7?'var(--ca)':pico>0?'var(--gn)':'var(--dm)';
  const stLabel=pico>maxFrentesG?'ACIMA CAP.':pico>maxFrentesG*.7?'ALTO':pico>0?'NORMAL':'SEM PARADA';
  html+=`<tr><td style="font-weight:700">${MN[mi]}</td><td style="text-align:center;font-weight:700;color:${stCol}">${pico}</td><td style="text-align:center">${diasComParada}d</td><td style="text-align:center;color:var(--dm)">${mDaysA[mi]-diasComParada}d</td><td><span style="font-size:7px;font-weight:700;padding:1px 5px;border-radius:6px;background:${stCol}15;color:${stCol}">${stLabel}</span></td></tr>`;
  offset+=mDaysA[mi];
}
html+=`</tbody></table></div>`;
html+=`</div>`;
el.innerHTML=html;
}

function rSim(){
const ef=+(document.getElementById('sE')?.value||45);
const pr=+(document.getElementById('sP')?.value||0.8);
const hr=+(document.getElementById('sH')?.value||8.73);
const dy=+(document.getElementById('sD')?.value||22);
const lo=+(document.getElementById('sL')?.value||35);
const dm=+(document.getElementById('sDm')?.value||5529);
const capBruta=ef*pr*hr*dy;
const capLiquida=capBruta*(1-lo/100);
const vi=dm>0?capLiquida/dm*100:0;
const pz=capLiquida>0?Math.ceil(dm/(capLiquida/dy)):999;
const prodDia=pr*hr*(1-lo/100);
const el=document.getElementById('sR');if(!el)return;
el.innerHTML=`
<div class="g g3" style="margin-bottom:6px">
<div style="text-align:center;padding:10px;background:rgba(7,69,108,.06);border-radius:5px"><div style="font-size:8px;color:var(--dm)">CAPACIDADE LÍQUIDA/MÊS</div><div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono';color:var(--cs)">${fm(capLiquida)} m²</div><div style="font-size:7px;color:var(--dm)">Bruta: ${fm(capBruta)} m² (−${lo}% perda)</div></div>
<div style="text-align:center;padding:10px;background:rgba(0,196,140,.06);border-radius:5px"><div style="font-size:8px;color:var(--dm)">VIABILIDADE (Cap/Demanda)</div><div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono';color:${vi>=100?'var(--gn)':vi>=70?'var(--ca)':'var(--rd)'}">${fd(vi,1)}%</div><div style="font-size:7px;color:var(--dm)">${vi>=100?'✅ Atende demanda':vi>=70?'⚠ Parcial':'❌ Não atende'}</div></div>
<div style="text-align:center;padding:10px;background:rgba(255,71,87,.06);border-radius:5px"><div style="font-size:8px;color:var(--dm)">PRAZO P/ DEMANDA</div><div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono';color:${pz<=dy?'var(--gn)':'var(--rd)'}">${pz} dias</div><div style="font-size:7px;color:var(--dm)">${pz<=dy?'Dentro do mês':'Excede '+dy+' dias úteis'}</div></div>
</div>
<div style="background:rgba(0,0,0,.02);border-radius:5px;padding:8px;font-size:8px;color:var(--dm)">
<div style="font-weight:700;color:var(--tx);margin-bottom:4px">📐 Memória de Cálculo:</div>
<div>Cap. Bruta = ${ef} pintores × ${pr} m²/hh × ${hr}h/dia × ${dy} dias = <b style="color:var(--tx)">${fm(capBruta)} m²</b></div>
<div>Cap. Líquida = ${fm(capBruta)} × (1 − ${lo}%) = <b style="color:var(--cs)">${fm(capLiquida)} m²</b></div>
<div>Prod./Pintor/Dia = ${pr} m²/hh × ${hr}h × (1−${lo}%) = <b style="color:var(--ca)">${prodDia.toFixed(1)} m²/pintor-dia</b></div>
<div>Viabilidade = ${fm(capLiquida)} ÷ ${fm(dm)} = <b style="color:${vi>=100?'var(--gn)':'var(--rd)'}">${fd(vi,1)}%</b></div>
<div>Prazo = ${fm(dm)} ÷ (${fm(capLiquida)} ÷ ${dy}) = <b>${pz} dias úteis</b></div>
<div style="margin-top:4px;color:var(--ca)">⚠ Este cálculo considera SOMENTE pintores (PIN). Andaimeiros e alpinistas são suporte e não produzem m².</div>
</div>`}

function swRdc(t,el){document.querySelectorAll('#p-rdc .stb').forEach(x=>{x.classList.remove('av','ac')});el.classList.add(t==='new'?'ac':'av');document.querySelectorAll('#p-rdc .sp').forEach(p=>p.classList.remove('on'));const m={dash:'rdcDash',list:'rdcList','new':'rdcNew'};document.getElementById(m[t]||'rdcDash').classList.add('on')}

function saveRDC(){
const lider=document.getElementById('rLider')?.value;
if(!lider){toast('Selecione a liderança!');return}
const rdc={
id:rdcList.length+1,
dt:document.getElementById('rData')?.value?.split('-').reverse().join('/')||'',
lider:lider,
turno:document.getElementById('rTurno')?.value||'Dia',
clima:(document.getElementById('rClima')?.value||'').replace('Tempo ',''),
ativo:document.getElementById('rAtivo')?.value||'N/A',
om:document.getElementById('rOM')?.value||'',
chegada:document.getElementById('rCheg')?.value||'00:00',
saida:document.getElementById('rSaida')?.value||'16:30',
desc:document.getElementById('rDesc')?.value||'',
desvio:document.getElementById('rDesvio')?.value||'Não',
consumo:document.getElementById('rConsumo')?.value||'N/A',
acab:document.getElementById('rAcab')?.value||'Não',
elast:document.getElementById('rElast')?.value||'Nenhum',
pta:document.getElementById('rPTA')?.value||'Nenhuma',
equipe:[...document.querySelectorAll('.rEq:checked')].map(c=>c.value)
};
rdcList.unshift(rdc);
toast('RDC salvo com sucesso!');
logAudit('RDC','Salvar','RDC por '+(document.getElementById('rLider')?document.getElementById('rLider').value:''));
persistAll();
renderRDC();
// Switch to list view
setTimeout(()=>{const listBtn=document.querySelector('#p-rdc .stb');if(listBtn)swRdc('list',listBtn)},100);
}

function clearRDC(){
['rLider','rAtivo','rOM','rDesc','rDesvio','rConsumo'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
toast('Formulário limpo');
}

function renderGantt(paradas){
const el=document.getElementById('ganttArea');if(!el)return;
if(!paradas.length){el.innerHTML='<div style="color:var(--dm);text-align:center;padding:10px">Sem paradas no período</div>';return}
const today=(new Date(new Date().toDateString()));
// Dynamic range based on filtered data
const allDates=paradas.flatMap(p=>[new Date(p.i),new Date(p.f)]);
let minD=new Date(Math.min(...allDates));
let maxD=new Date(Math.max(...allDates));
// Extend to full month boundaries
minD=new Date(minD.getFullYear(),minD.getMonth(),1);
maxD=new Date(maxD.getFullYear(),maxD.getMonth()+1,0);
const totalDays=Math.ceil((maxD-minD)/(864e5))+1;
// Dynamic width: fewer days = wider bars = more detail
const dayW=Math.max(3,Math.min(20,Math.max(800,window.innerWidth-300)/totalDays));

// Month headers with day ticks
let html=`<div style="min-width:${totalDays*dayW+180}px;position:relative;font-family:'JetBrains Mono',monospace">`;
html+=`<div style="display:flex;margin-left:180px;border-bottom:1px solid var(--bd)">`;
let mStart=new Date(minD);
while(mStart<=maxD){
  const mEnd=new Date(mStart.getFullYear(),mStart.getMonth()+1,0);
  const daysInView=Math.min(Math.ceil((mEnd-mStart)/(864e5))+1, Math.ceil((maxD-mStart)/(864e5))+1);
  const w=daysInView*dayW;
  html+=`<div style="width:${w}px;text-align:center;font-size:8px;font-weight:700;color:var(--cs);padding:3px 0;border-right:1px solid rgba(0,173,249,.1);background:rgba(14,106,166,.06)">${MN[mStart.getMonth()]}`;
  // Show day numbers if zoomed in enough
  if(dayW>=8){
    html+=`<div style="display:flex;font-size:5px;color:var(--dm);font-weight:400">`;
    for(let d=mStart.getDate();d<=mEnd.getDate()&&new Date(mStart.getFullYear(),mStart.getMonth(),d)<=maxD;d++){
      html+=`<div style="width:${dayW}px;text-align:center;border-right:1px solid rgba(0,0,0,.02)">${d}</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  mStart=new Date(mStart.getFullYear(),mStart.getMonth()+1,1);
}
html+=`</div>`;

// Today marker
if(today>=minD&&today<=maxD){
  const todayOff=Math.ceil((today-minD)/(864e5));
  html+=`<div style="position:absolute;left:${180+todayOff*dayW}px;top:0;bottom:0;width:2px;background:var(--rd);opacity:.6;z-index:5"></div>`;
  html+=`<div style="position:absolute;left:${180+todayOff*dayW-10}px;top:1px;font-size:7px;color:var(--rd);font-weight:800;z-index:6;background:rgba(255,71,87,.15);padding:0 4px;border-radius:3px">HOJE</div>`;
}

// Bars with detail expansion
paradas.forEach((p,idx)=>{
  const startOff=Math.max(0,Math.ceil((new Date(p.i)-minD)/(864e5)));
  const dur=Math.max(1,Math.ceil((new Date(p.f)-new Date(p.i))/(864e5)));
  const ini=new Date(p.i);const fim=new Date(p.f);
  const isDone=fim<today;const isActive=ini<=today&&fim>=today;
  const col=isDone?'#00C48C':isActive?'#FFAD00':'#00ADF9';
  const stLabel=isDone?'✓ Concluída':isActive?'⚡ Em Curso':'◉ Programada';
  const barW=Math.max(dur*dayW,dayW*2);
  const showText=barW>40;

  html+=`<div class="gantt-wrap" style="cursor:pointer" onclick="this.querySelector('.gdet').classList.toggle('show')">`;
  html+=`<div class="gantt-row" style="display:flex;align-items:center;height:${dayW>=6?22:16}px;margin:${dayW>=6?2:1}px 0">`;
  html+=`<div style="width:180px;font-size:${dayW>=8?9:7}px;color:#c0d0e0;text-align:right;padding-right:6px;flex-shrink:0;overflow:hidden;white-space:nowrap;font-weight:600">${p.r}<span style="color:var(--dm);font-weight:400"> — ${p.a.substring(0,20)}</span></div>`;
  html+=`<div style="flex:1;position:relative;height:${dayW>=6?18:12}px">`;
  // Bar
  html+=`<div style="position:absolute;left:${startOff*dayW}px;width:${barW}px;height:100%;background:${col};border-radius:${dayW>=6?4:2}px;display:flex;align-items:center;padding:0 ${dayW>=6?5:2}px;gap:3px;box-shadow:0 1px 4px ${col}40;transition:transform .15s;font-size:${dayW>=6?8:6}px;color:#fff;font-weight:700;overflow:hidden;white-space:nowrap;opacity:${isDone?.7:1}" onmouseenter="this.style.transform='scaleY(1.3)'" onmouseleave="this.style.transform='scaleY(1)'">${showText?p.d+'h · '+p.i.split('-').reverse().slice(0,2).join('/'):''+p.d+'h'}</div>`;
  html+=`</div></div>`;
  // Expandable detail row
  html+=`<div class="gdet" style="display:none;margin-left:180px;padding:4px 8px;background:rgba(14,106,166,.06);border-left:2px solid ${col};border-radius:0 4px 4px 0;margin-bottom:2px;font-size:9px">`;
  html+=`<div style="display:flex;gap:12px;flex-wrap:wrap">`;
  html+=`<div><span style="color:var(--dm)">Rota:</span> <b style="color:${col}">${p.r}</b></div>`;
  html+=`<div><span style="color:var(--dm)">Ativos:</span> <b>${p.a}</b></div>`;
  html+=`<div><span style="color:var(--dm)">Início:</span> <b>${p.i.split('-').reverse().join('/')}</b></div>`;
  html+=`<div><span style="color:var(--dm)">Fim:</span> <b>${p.f.split('-').reverse().join('/')}</b></div>`;
  html+=`<div><span style="color:var(--dm)">Duração:</span> <b>${p.d}h (${Math.round(p.d/24)}d)</b></div>`;
  html+=`<div><span style="color:var(--dm)">Gerência:</span> <b>${p.g}</b></div>`;
  html+=`<div><span style="color:var(--dm)">Status:</span> <b style="color:${col}">${stLabel}</b></div>`;
  html+=`</div></div>`;
  html+=`</div>`;
});
html+=`</div>`;
el.innerHTML=html;
}

function renderLayoutMap(paradas){
const el=document.getElementById('layoutMap');if(!el)return;
const today=(new Date(new Date().toDateString()));
const getS=p=>{const i=new Date(p.i),f=new Date(p.f);return f<today?'done':i<=today?'active':'planned'};
const sCol={done:'#00C48C',active:'#FFAD00',planned:'#00ADF9'};
const ri={};
paradas.forEach(p=>{
  if(!ri[p.r])ri[p.r]={n:0,s:'planned',ps:[],tac:false};
  ri[p.r].n++;ri[p.r].ps.push(p);
  if(p.e==='TAC')ri[p.r].tac=true;
  const st=getS(p);
  if(st==='active')ri[p.r].s='active';
  else if(st==='done'&&ri[p.r].s==='planned')ri[p.r].s='done';
});

// Equipment renderer
function eq(id,x,y,w,h,label,type){
  const info=ri[id];
  const col=info?sCol[info.s]:'#2a4a5a';
  const op=info?1:.4;
  const isActive=info?.s==='active';
  const bdr=info?.tac&&info.ps.some(p=>p.e!=='TAC')?'#FF4757':col;
  let s='';
  if(isActive) s+=`<circle cx="${x+w/2}" cy="${y+h/2}" r="${Math.max(w,h)/2+6}" fill="none" stroke="${col}" stroke-width="1.5" opacity=".4"><animate attributeName="opacity" values=".4;.1;.4" dur="2s" repeatCount="indefinite"/></circle>`;
  if(type==='rect'){
    s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${col}" fill-opacity="${op*.2}" stroke="${bdr}" stroke-width="${info?1.5:.5}" style="cursor:pointer"/>`;
    s+=`<text x="${x+w/2}" y="${y+h/2+1}" text-anchor="middle" dominant-baseline="middle" fill="${info?'#fff':'#4a6a7a'}" font-size="${w>40?8:7}" font-weight="800" opacity="${op}">${label}</text>`;
  } else {
    const r=Math.max(w,h)/2;
    s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" fill-opacity="${op*.25}" stroke="${bdr}" stroke-width="${info?1.5:.5}" style="cursor:pointer"/>`;
    s+=`<text x="${x}" y="${y+1}" text-anchor="middle" dominant-baseline="middle" fill="${info?'#fff':'#4a6a7a'}" font-size="${r>8?7:6}" font-weight="800" opacity="${op}">${label}</text>`;
  }
  if(info) s+=`<title>${id}: ${info.n} parada(s) TAC\n${info.ps.map(p=>p.i.split('-').reverse().join('/')+' → '+p.f.split('-').reverse().join('/')+' ('+p.d+'h)').join('\n')}</title>`;
  return s;
}

function showAddParada(){
const f=document.getElementById('addParadaForm');
f.style.display=f.style.display==='none'?'block':'none';

function addParada(){
const rota=document.getElementById('npRota')?.value;
const ativo=document.getElementById('npAtivo')?.value;
const ini=document.getElementById('npIni')?.value;
const fim=document.getElementById('npFim')?.value;
const dur=parseInt(document.getElementById('npDur')?.value)||120;
const ger=document.getElementById('npGer')?.value||'EMBARQUE';
if(!rota||!ativo||!ini||!fim){toast('Preencha todos os campos obrigatórios!');return}
const mes=parseInt(ini.split('-')[1]);
PARADAS.push({g:ger,e:'TAC',r:rota,a:ativo,i:ini,f:fim,d:dur,m:mes});
document.getElementById('addParadaForm').style.display='none';
toast('Parada '+rota+' adicionada!');
R();
}

function editParada(rota,inicio){
const idx=PARADAS.findIndex(p=>p.r===rota&&p.i===inicio&&p.e==='TAC');
if(idx<0){toast('Parada não encontrada');return}
const p=PARADAS[idx];
document.getElementById('addParadaForm').style.display='block';
document.getElementById('npRota').value=p.r;
document.getElementById('npAtivo').value=p.a;
document.getElementById('npIni').value=p.i;
document.getElementById('npFim').value=p.f;
document.getElementById('npDur').value=p.d;
// Remove old entry - save will create new
PARADAS.splice(idx,1);
toast('Editando '+rota+' — altere e salve');
}

function delParada(rota,inicio){
if(!confirm('Remover parada '+rota+' de '+inicio.split('-').reverse().join('/')+'?'))return;
const idx=PARADAS.findIndex(p=>p.r===rota&&p.i===inicio&&p.e==='TAC');
if(idx>=0){PARADAS.splice(idx,1);persistAll();logAudit('Mapa','Excluir','Parada removida');toast('Parada removida!');R()}
}

function exportParadas(){
const tacP=PARADAS.filter(p=>p.e==='TAC');
let csv='Rota;Ativos;Inicio;Fim;Duracao;Gerencia;Status\n';
const today=(new Date(new Date().toDateString()));
tacP.forEach(p=>{
  const fim=new Date(p.f);const ini=new Date(p.i);
  const st=fim<today?'Concluída':ini<=today?'Em Curso':'Programada';
  csv+=`${p.r};${p.a};${p.i};${p.f};${p.d};${p.g};${st}\n`;
});
const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='paradas_tac_2026.csv';a.click();
toast('CSV exportado!');
}

var mesesDisp=12-mesesComDados;

  {fator:'Aguardando Bloqueio / PT / Liberação (VALE)',tipo:'Externo',pct:8,impacto:'ALTO',origem:'Contratante'},

  {fator:'Preparação de Superfície (mascaramento)',tipo:'Operacional',pct:4,impacto:'BAIXO',origem:'Processo'},
  {fator:'Intervalos (café, hidratação, banheiro)',tipo:'Obrigatório',pct:6,impacto:'BAIXO',origem:'Normativo (CLT)'},
];
perdas.sort(function(a,b){return b.pct-a.pct});
var perdaTotal=perdas.reduce(function(s,p){return s+p.pct},0);
var perdaExterna=perdas.filter(function(p){return p.origem==='Contratante'||p.origem==='Ambiental'}).reduce(function(s,p){return s+p.pct},0);
var perdaInterna=perdaTotal-perdaExterna;
var hhPerdidoMes=Math.round(hhBruto*perdaTotal/100);

// Cenários de melhoria
var cenarios=[];
[10,15,20,25].forEach(function(reducao){
  var novaPerdaPct=Math.max(15,perdaTotal*(1-reducao/100));
  var novoHHLiq=Math.round(hhBruto*(1-novaPerdaPct/100));
  var novaCapMes=Math.round(novoHHLiq*CFG.prodPIN);
  var mesesNecNovo=novaCapMes>0?Math.ceil(pendM2/novaCapMes):99;
  var ganhoM2=novaCapMes-capMes;
  var adicPIN=0;
  if(mesesNecNovo>mesesDisp){
    var capNecessaria=Math.ceil(pendM2/mesesDisp);
    adicPIN=Math.max(0,Math.ceil((capNecessaria-novaCapMes)/(CFG.prodPIN*CFG.jornada*CFG.diasUteis*(1-novaPerdaPct/100))));
  }
  cenarios.push({reducao:reducao,perdaNova:Math.round(novaPerdaPct),capNova:novaCapMes,meses:mesesNecNovo,ganho:ganhoM2,adicPIN:adicPIN,viavel:mesesNecNovo<=mesesDisp});
});

function setSegItem(id,key,val){var a=EXEC_ATV.find(function(x){return x.id===id});if(!a)return;if(!a.seg)a.seg={};a.seg[key]=val;showSegChecklist(id)}

function confirmStartSeg(id){var a=EXEC_ATV.find(function(x){return x.id===id});if(!a)return;
// Salvar campos extras
var resp=document.getElementById('segResp');if(resp)a.seg.responsavel_vale=resp.value;
var dt=document.getElementById('segDtLib');if(dt)a.seg.dt_liberacao=dt.value;
var obs=document.getElementById('segObs');if(obs)a.seg.obs_seg=obs.value;
// Verificar se tudo OK ou N/A
var pend=[];
['bloqueio','limpeza','pt','ast'].forEach(function(k){if(a.seg[k]==='pendente')pend.push(k)});
if(pend.length>0){toast('🔴 Itens pendentes: '+pend.join(', ')+'. Verifique antes de iniciar.');return}
// START
a.status='exec';a.etapa=a.andaime&&a.andStatus==='pendente'?'and_mont':'prep';
if(a.andaime&&a.andStatus==='pendente')a.andStatus='montando';
if(!a.dtIni||a.dtIni==='')a.dtIni=new Date().toISOString().split('T')[0];
document.getElementById('execDetail').style.display='none';
toast('▶ '+a.rota+' iniciada! Segurança ✅ verificada');renderExec()}

function forceStartSeg(id){if(!confirm('⚠ ATENÇÃO: Iniciar sem todas as verificações de segurança pode gerar riscos. Deseja continuar?'))return;
var a=EXEC_ATV.find(function(x){return x.id===id});if(!a)return;
var resp=document.getElementById('segResp');if(resp)a.seg.responsavel_vale=resp.value;
var obs=document.getElementById('segObs');if(obs)a.seg.obs_seg=(obs.value?obs.value+' | ':'')+'FORÇADO SEM CHECKLIST COMPLETO';
a.status='exec';a.etapa=a.andaime&&a.andStatus==='pendente'?'and_mont':'prep';
if(a.andaime&&a.andStatus==='pendente')a.andStatus='montando';
if(!a.dtIni||a.dtIni==='')a.dtIni=new Date().toISOString().split('T')[0];
a.impactos.push({dt:new Date().toLocaleDateString('pt-BR').substring(0,5),tipo:'Risco Segurança',h:0,desc:'START forçado sem checklist completo'});
document.getElementById('execDetail').style.display='none';
toast('⚠ '+a.rota+' iniciada SEM checklist completo!');renderExec()}

function validarMatVale(mat){

function confirmarValidacaoVale(id){
var a=EXEC_ATV.find(function(x){return x.id===id});if(!a)return;

a.seg.mat_vale=matUp;

function renderPipelineFases(atv){
if(!atv)return '';
// Determinar quais pipelines mostrar baseado no tipo de equipe
var pipes=[];
if(atv.equipe.indexOf('PIN')>=0||atv.equipe==='PIN')pipes.push({disc:'PIN',fases:FASES_PIN_V21,c:'var(--co)',label:'🎨 PINTURA'});
if(atv.equipe.indexOf('AND')>=0||atv.andaime)pipes.push({disc:'AND',fases:FASES_AND_V21,c:'var(--ca)',label:'🏗️ ANDAIME'});
// Verificar apontamentos para determinar fase atual
var lastApt=atv.apontamentos.length>0?atv.apontamentos[atv.apontamentos.length-1]:null;
var currentEtapa=atv.etapa||'aguard';
return pipes.map(function(pipe){
return '<div style="margin-bottom:4px">'+
'<div style="font-size:7px;font-weight:800;color:'+pipe.c+';margin-bottom:2px">'+pipe.label+'</div>'+
'<div style="display:flex;gap:1px;align-items:center">'+
pipe.fases.map(function(f,idx){
// Determinar status de cada fase
var faseAtv=currentEtapa===f.id;
var faseDone=false;
// Verificar se tem apontamento nessa fase
atv.apontamentos.forEach(function(ap){
if(ap.etapa===f.id||ap.etapa===f.nome)faseDone=true;
});
// Para pintura: fases antes da atual são concluídas
if(pipe.disc==='PIN'){
var curIdx=FASES_PIN_V21.findIndex(function(x){return x.id===currentEtapa});
if(curIdx>=0&&idx<curIdx)faseDone=true;
if(idx===curIdx)faseAtv=true;
}
var bg=faseDone?pipe.c:(faseAtv?pipe.c:'rgba(0,0,0,.06)');
var op=faseDone?'1':(faseAtv?'0.7':'0.3');
return '<div title="'+f.nome+': '+f.desc+'" style="flex:1;height:6px;background:'+bg+';opacity:'+op+';border-radius:1px;position:relative;cursor:help">'+
(faseAtv?'<div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:6px">▼</div>':'')+
'</div>';
}).join('')+
'</div>'+
'<div style="display:flex;justify-content:space-between;font-size:5px;color:var(--dm);margin-top:1px">'+
'<span>'+pipe.fases[0].nome.split(' ')[0]+'</span>'+
'<span>'+pipe.fases[pipe.fases.length-1].nome.split(' ')[0]+'</span>'+
'</div></div>';
}).join('');
}

});

function meq(id,x,y,w,h,label){
  const info=ri2[id];
  const col=info?sCol2[info.s]:'#2a4a5a';
  const op=info?1:.3;
  const isAct=info?.s==='active';
  let s='';
  if(isAct)s+=`<circle cx="${x+w/2}" cy="${y+h/2}" r="${Math.max(w,h)/2+5}" fill="none" stroke="${col}" stroke-width="2" opacity=".5"><animate attributeName="opacity" values=".6;.1;.6" dur="1.5s" repeatCount="indefinite"/><animate attributeName="r" values="${Math.max(w,h)/2+3};${Math.max(w,h)/2+8};${Math.max(w,h)/2+3}" dur="1.5s" repeatCount="indefinite"/></circle>`;
  s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="2" fill="${col}" fill-opacity="${op*.25}" stroke="${col}" stroke-width="${isAct?2:info?1:.3}"/>`;
  s+=`<text x="${x+w/2}" y="${y+h/2+1}" text-anchor="middle" dominant-baseline="middle" fill="${info?'#fff':'#4a6a7a'}" font-size="${w>35?7:5}" font-weight="800" opacity="${op}">${label}</text>`;
  if(isAct){
    const fIdx=frentes.findIndex(f=>f.r===id);
    if(fIdx>=0)s+=`<text x="${x+w/2}" y="${y-4}" text-anchor="middle" fill="#FFAD00" font-size="6" font-weight="900">F${fIdx+1} ⚡</text>`;
  }
  if(info)s+=`<title>${id}: ${info.n} parada(s)\n${info.ps.map(p=>getS2(p).toUpperCase()+' '+p.i.split('-').reverse().join('/')).join('\n')}</title>`;

}

function addVT(){
const rota=document.getElementById('vtRota').value;
const disc=document.getElementById('vtDisc').value;
const area=+(document.getElementById('vtArea').value)||200;
const pin=+(document.getElementById('vtPIN').value)||0;
const and_=+(document.getElementById('vtAND').value)||0;
const alp=+(document.getElementById('vtALP').value)||0;
const dias=+(document.getElementById('vtDias').value)||5;
const desc=document.getElementById('vtDesc').value;
const resp=document.getElementById('vtResp')?.value||'';
const os=document.getElementById('vtOS')?.value||'';
const om=document.getElementById('vtOM')?.value||'';
const crit=document.getElementById('vtCrit')?.value||'MÉDIA';
const tipo=document.getElementById('vtTipo')?.value||'PREVENTIVA';
const dataVT=document.getElementById('vtData')?.value||'';
const dataExec=document.getElementById('vtDataExec')?.value||'';
const prazo=document.getElementById('vtPrazo')?.value||'';
const mec=+(document.getElementById('vtMEC')?.value)||0;
const tst=+(document.getElementById('vtTST')?.value)||0;
const enc=+(document.getElementById('vtENC')?.value)||0;
const sup=+(document.getElementById('vtSUP')?.value)||0;
const condChecks=[...document.querySelectorAll('.vtCond:checked')].map(c=>c.value);
if(!rota){toast('Selecione uma parada/rota');return}
// Motor de análise
const prodH=PROD_REF[disc]?.ciclo||0.8;
const capCalc=Math.round(pin*prodH*CFG.jornada*dias*(1-CFG.perdaPIN/100));
let analise='ADEQUADO';
if(capCalc<area*0.8)analise='SUBDIMENSIONADO';
else if(capCalc>area*1.5)analise='SUPERDIMENSIONADO';
// Materiais
const mats=[];
if(disc==='PIN'){Object.entries(MAT_REF).forEach(([mat,ref])=>{mats.push({mat,qtd:Math.ceil(area*ref.consumo),un:ref.un.split('/')[0]})})}
// Criar no VT_DATA (compatibilidade)
VT_DATA.push({rota,disc,area,pin,and:and_,alp,dias,desc,capCalc,analise,mats,data:dataVT||new Date().toISOString().split('T')[0],resp,os,om,crit,tipo,condicionantes:condChecks});persistAll();
// Criar ATIVIDADE na cadeia central
criarAtividade({
  numVT:'VT-'+ATI_SEQ,rota,disciplina:disc,area:rota,ativo:rota,
  os,om,responsavel:resp,descricao:desc,criticidade:crit,tipoAtividade:tipo,
  dataVisita:dataVT,dataEstimadaExec:dataExec,duracaoPrevista:dias,prazoLimite:prazo,
  areaM2:area,
  recursos:{PIN:pin,AND:and_,ALP:alp,MEC:mec,TST:tst,ENC:enc,SUP:sup},
  materiais:mats,
  condicionantes:{limpeza:condChecks.includes('Limpeza prévia'),bloqueio:condChecks.includes('Bloqueio/PT'),isolamento:condChecks.includes('Isolamento área'),inspecaoPrevia:condChecks.includes('Inspeção prévia'),acessoEspecial:condChecks.includes('Acesso especial'),andaime:condChecks.includes('Andaime'),plataforma:condChecks.includes('Plataforma elev.'),alpinismo:condChecks.includes('Alpinismo'),liberacaoOp:condChecks.includes('Liberação oper.')}
});
toast('VT registrada + Atividade criada: '+rota+' — '+analise);
R();
}

function alterarStatus(atvId,novoStatus,justificativa,responsavel){
const atv=ATIVIDADES.find(a=>a.id===atvId);
if(!atv)return;
if(!justificativa&&['CANCELADA','POSTERGADA','BLOQUEADA'].includes(novoStatus)){
  toast('Justificativa obrigatória para '+novoStatus);return;
}
const antigo=atv.status;
atv.status=novoStatus;
atv.statusHistory.push({status:novoStatus,data:new Date().toISOString().split('T')[0],responsavel:responsavel||'Usuário',justificativa:justificativa||''});
registrarHistorico(atvId,'STATUS',antigo+' → '+novoStatus+': '+justificativa,responsavel);
// Reflexo na cadeia
if(novoStatus==='CANCELADA'||novoStatus==='POSTERGADA'){
  // Liberar materiais reservados
  atv.materiaisReservados.forEach(mr=>{
    const est=ALM_ESTOQUE.find(e=>e.mat.includes(mr.mat.split(' ')[0]));
    if(est)est.qtd+=mr.qtd;
  });
  atv.materiaisReservados=[];
}
toast('Status: '+novoStatus);
R();
}

function registrarHistorico(atvId,tipo,descricao,responsavel){
HISTORICO.push({atvId,tipo,descricao,responsavel:responsavel||'Sistema',data:new Date().toISOString(),timestamp:Date.now()});
}

function getHistoricoAtividade(atvId){return HISTORICO.filter(h=>h.atvId===atvId)}

var ESCAL_RULES=[
  {campo:'impacto',limiteH:4,para:'Coordenador',msg:'Impacto >4h sem resolução'},
  {campo:'impacto',limiteH:8,para:'Gerente',msg:'Impacto >8h — escalar gerência'},
  {campo:'parada_atraso',limiteDias:3,para:'Coordenador',msg:'Parada atrasada >3 dias'},
  {campo:'rip_reprovado',limiteN:2,para:'Gerente',msg:'2+ reprovações no mesmo ativo'},
];
function checkEscalation(){
  var alerts=[];
  // Verificar impactos não resolvidos
  if(D.impactos){
    D.impactos.forEach(function(imp){
      if(imp.h>=8)alerts.push({nivel:'🔴 GERENTE',msg:imp.t+': '+imp.h+'h — '+imp.d,regra:ESCAL_RULES[1]});
      else if(imp.h>=4)alerts.push({nivel:'🟡 COORD',msg:imp.t+': '+imp.h+'h — '+imp.d,regra:ESCAL_RULES[0]});
    });
  }
  // Verificar paradas atrasadas
  var hoje=new Date();
  PARADAS.forEach(function(p){
    var fim=new Date(p.f);
    var diff=Math.floor((hoje-fim)/(864e5));
    if(diff>3)alerts.push({nivel:'🟠 COORD',msg:p.r+' atrasada '+diff+' dias',regra:ESCAL_RULES[2]});
  });
  return alerts;
}

// VALIDAÇÃO CRUZADA RDC × PONTO × BM
function validacaoCruzada(){
  var issues=[];
  // Verificar se horas RDC batem com efetivo
  var totalHorasEF=EF.filter(function(e){return e.st==='ativo'}).reduce(function(s,e){return s+(e.hn||0)+(e.he||0)},0);
  var totalHorasBM=0;
  // BM items tipo HH
  if(typeof BM!=='undefined'){
    BM.forEach(function(b){if(b.t==='HH')totalHorasBM+=b.nm||0});
  }
  if(totalHorasEF>0&&totalHorasBM>0){
    var diff=Math.abs(totalHorasEF-totalHorasBM);
    if(diff>totalHorasEF*0.1)issues.push({tipo:'⚠️ Divergência HH',desc:'Efetivo: '+totalHorasEF.toFixed(0)+'h vs BM: '+totalHorasBM.toFixed(0)+'h (diff: '+diff.toFixed(0)+'h)',nivel:'alto'});
  }
  // Verificar RDC sem OM
  if(typeof rdcList!=='undefined'){
    rdcList.forEach(function(r){
      if(!r.om||r.om==='0000000000')issues.push({tipo:'⚠️ RDC sem OM',desc:r.dt+' - '+r.lider+': sem ordem de manutenção',nivel:'medio'});
    });
  }
  return issues;
}

// HISTÓRICO COMPARATIVO MEDIÇÕES
function getHistoricoMedicoes(){
  var meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var hist=[];
  if(typeof PINT_LAUDOS!=='undefined'){
    for(var m=1;m<=12;m++){
      var laudosMes=PINT_LAUDOS.filter(function(l){
        var dt=l.di||'';if(!dt)return false;
        var parts=dt.split('/');return parseInt(parts[1])===m;
      });
      var m2Mes=laudosMes.reduce(function(s,l){return s+(l.m2e||0)},0);
      var concMes=laudosMes.filter(function(l){return l.st==='CONCLUÍDO'}).length;
      if(laudosMes.length>0||m<=3)hist.push({mes:meses[m-1],laudos:laudosMes.length,concluidos:concMes,m2:Math.round(m2Mes)});
    }
  }
  return hist;
}

// ===== UPLOAD PINTURA XLSX =====
function uploadPintXLSX(file){
  if(!file){toast('Selecione arquivo');return}
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1});
      if(rows.length<2){toast('Planilha vazia');return}
      var hdr=rows[0].map(function(h){return(h||'').toString().toLowerCase().trim()});
      // Detectar colunas da planilha de pintura
      var iLaudo=hdr.findIndex(function(h){return h.includes('laudo')||h.includes('tag')});
      var iAtivo=hdr.findIndex(function(h){return h.includes('ativo')||h.includes('equip')});
      var iRota=hdr.findIndex(function(h){return h.includes('rota')||h.includes('local')});
      var iM2=hdr.findIndex(function(h){return h.includes('m2')||h.includes('área')||h.includes('area')});
      var iStatus=hdr.findIndex(function(h){return h.includes('status')||h.includes('situaç')});
      var iTerminal=hdr.findIndex(function(h){return h.includes('terminal')||h.includes('term')});
      if(iLaudo<0&&iAtivo<0){toast('Coluna LAUDO ou ATIVO não encontrada');return}
      var count=0;
      for(var i=1;i<rows.length;i++){
        var r=rows[i];if(!r)continue;
        var laudo=String(r[iLaudo>=0?iLaudo:0]||'').trim();
        if(!laudo)continue;
        // Tentar atualizar laudo existente no PINT_LAUDOS
        if(typeof PINT_LAUDOS!=='undefined'){
          var existing=PINT_LAUDOS.find(function(l){return l.l===laudo});
          if(existing){
            if(iM2>=0&&r[iM2])existing.m2e=parseFloat(r[iM2])||existing.m2e;
            if(iStatus>=0&&r[iStatus]){
              var oldSt=existing.st;
              var newSt=String(r[iStatus]).toUpperCase();
              if(newSt.includes('CONC'))existing.st='CONCLUÍDO';
              else if(newSt.includes('EXEC'))existing.st='EM EXECUÇÃO';
              else if(newSt.includes('PROG'))existing.st='PROGRAMADO';
              if(oldSt!==existing.st){
                PINT_CHANGES.push({dt:new Date().toLocaleString('pt-BR'),laudo:laudo,campo:'STATUS',de:oldSt,para:existing.st,user:'Upload XLSX'});
              }
            }
            count++;
          }
        }
      }
      if(count>0){
        persistAll();
        logAudit('Pintura','Upload',file.name+': '+count+' laudos atualizados');
        toast(count+' laudos atualizados via '+file.name);
        // Re-render pintura
        try{buildPintura()}catch(e){}
        R();
      }else{
        toast('Nenhum laudo correspondente encontrado');
      }
    }catch(e){toast('Erro: '+e.message);console.error(e)}
  };
  reader.readAsArrayBuffer(file);
}

// acesso ao BM (declarado com const no script original — não está em window)
function getBM(){try{return BM||[]}catch(e){return window.BM||[]}}
// funções cobradas disponíveis (bases dos itens HH do BM)
function funcoesBM(){
  var set={};
  getBM().forEach(function(i){
    if(i.t!=='HH')return;
    var b=String(i.d).split(/\s*-\s*(?:Hora Normal|Hora Extra|Adicional Noturno)/)[0].trim();
    set[b]=1;
  });
  return Object.keys(set).sort();
}
// item HH do BM por (função cobrada, tipo) — tolerante a variações de grafia
// ("Hora Extra 50%", "Hora Extra - 150% Domingos e Feriados)", "20% ADN", "Adicional Noturno 20%")
function bmTipoMatch(dNorm,tipo){
  if(tipo==='HN')return /HORA NORMAL/.test(dNorm);
  if(tipo==='HE50')return /EXTRA/.test(dNorm)&&/(^|[^0-9])50\s*%/.test(dNorm)&&!/150\s*%/.test(dNorm);
  if(tipo==='HE100')return /EXTRA/.test(dNorm)&&/100\s*%/.test(dNorm);
  if(tipo==='HE150')return /EXTRA/.test(dNorm)&&/150\s*%/.test(dNorm);
  if(tipo==='ADN')return /(ADICIONAL NOTURNO|ADN|AD\.? ?NOT)/.test(dNorm)&&!/EXTRA/.test(dNorm);
  return false;
}
function bmItemDe(func,tipo){
  var fn=normTxt(func);
  // 1º: item com sufixo explícito do tipo ("... - Hora Normal", "... 50%")
  var it=getBM().find(function(i){
    if(i.t!=='HH')return false;
    var d=normTxt(i.d);
    return d.indexOf(fn)===0 && d!==fn && bmTipoMatch(d,tipo);
  });
  if(it)return it;
  // 2º: funções administrativas têm item único sem sufixo (Coordenador, Engenheiro de Segurança…) = Hora Normal
  if(tipo==='HN')it=getBM().find(function(i){return i.t==='HH'&&normTxt(i.d)===fn});
  return it;
}

// LEITURA DE PDF (pdf.js sob demanda) + OCR de reserva (tesseract.js)
// ---------------------------------------------------------------------------
var _scriptCache={};
function loadScript(src){
  if(_scriptCache[src])return _scriptCache[src];
  _scriptCache[src]=new Promise(function(res,rej){
    var s=document.createElement('script');s.src=src;
    var to=setTimeout(function(){s.remove();delete _scriptCache[src];rej(new Error('Tempo esgotado: '+src))},15000);
    s.onload=function(){clearTimeout(to);res()};
    s.onerror=function(){clearTimeout(to);s.remove();delete _scriptCache[src];rej(new Error('Falha ao carregar '+src))};
    document.head.appendChild(s);
  });
  return _scriptCache[src];
}
function loadScriptAny(lista){var p=Promise.reject();lista.forEach(function(src){p=p.catch(function(){return loadScript(src).then(function(){return src})})});return p}
function ensurePdfJs(){
  if(window.pdfjsLib)return Promise.resolve();
  // usa a cópia local publicada junto do sistema (libs/); se não existir (arquivo avulso), cai no CDN
  return loadScriptAny(['pdf.min.js','libs/pdf.min.js','https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js']).then(function(src){
    window.pdfjsLib.GlobalWorkerOptions.workerSrc=(src==='pdf.min.js')?'pdf.worker.min.js':(src.indexOf('libs/')===0)?'libs/pdf.worker.min.js':'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  });
}
function ensureXLSX(){
  if(window.XLSX)return Promise.resolve();
  return loadScriptAny(['xlsx.full.min.js','libs/xlsx.full.min.js','https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js']);
}
try{ensureXLSX()}catch(e){}
function ensureTesseract(){
  if(window.Tesseract)return Promise.resolve();
  return loadScriptAny(['https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.5/tesseract.min.js','https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js']);
}
// extrai texto por página, agrupando itens pela coordenada Y (linhas)
function pdfToLines(data){
  return ensurePdfJs().then(function(){
    return window.pdfjsLib.getDocument({data:data}).promise;
  }).then(function(pdf){
    var seq=Promise.resolve([]),n=pdf.numPages;
    for(var p=1;p<=n;p++){(function(pg){
      seq=seq.then(function(acc){
        return pdf.getPage(pg).then(function(page){return page.getTextContent()}).then(function(tc){
          var rows={};
          tc.items.forEach(function(it){
            var y=Math.round(it.transform[5]);
            var key=null;
            for(var k in rows){if(Math.abs(k-y)<=2){key=k;break}}
            if(key==null)key=y;
            (rows[key]=rows[key]||[]).push({x:it.transform[4],s:it.str});
          });
          var ys=Object.keys(rows).map(Number).sort(function(a,b){return b-a});
          ys.forEach(function(y){
            var line=rows[y].sort(function(a,b){return a.x-b.x}).map(function(i){return i.s}).join(' ').replace(/\s+/g,' ').trim();
            if(line)acc.push(line);
          });
          return acc;
        });
      });
    })(p)}
    return seq.then(function(lines){return{lines:lines,pdf:pdf,numPages:n}});
  });
}
// OCR de reserva: renderiza páginas em canvas e passa no tesseract (para PDF escaneado)
function pdfOcrLines(pdf,numPages,onProg){
  return ensureTesseract().then(function(){
    var seq=Promise.resolve([]);
    for(var p=1;p<=numPages;p++){(function(pg){
      seq=seq.then(function(acc){
        if(onProg)onProg('OCR página '+pg+'/'+numPages+'…');
        return pdf.getPage(pg).then(function(page){
          var vp=page.getViewport({scale:2});
          var c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;
          return page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise.then(function(){
            return window.Tesseract.recognize(c,'por');
          }).then(function(r){
            r.data.text.split('\n').forEach(function(l){l=l.trim();if(l)acc.push(l)});
            return acc;
          });
        });
      });
    })(p)}
    return seq;
  });
}

// ---------------------------------------------------------------------------
// PARSER DO ESPELHO DE PONTO (formato oficial RH/SAP CBSI)
// ---------------------------------------------------------------------------
var RX_DIA=/^(\d{2}\/\d{2}\/\d{2}(?:\d{2})?)\s+(Seg|Ter|Qua|Qui|Sex|S[áa]b|Dom)\s*(.*)$/;
var RX_HORA=/(\d{1,2}:\d{2})\s*([EAD])/g;
var RX_CONTA=/(Hora Extra 50%|Hora Extra 100%|Hora Extra 150%|HE 150% Pagar|Adic\.? ?Not\.? ?Informativo|Adic ?Not ?HE ?50%|Adic ?Not ?HE ?100%|Ad ?Not ?HE ?150%|Atraso[^\d]*|Aus[êe]ncia[^\d]*|Falta[^\d]*|Licen[çc]a[^\d]*|Sa[íi]da[^\d]*|Afastam\.?[^\d]*|Interjornada[^\d]*|Aguardando[^\d]*|Treinamento|Exame[^\d]*|Presen[çc]a)\s+([\d]{1,2}[:,][\d]{2})/g;

function parseEspelhos(lines){
  var blocos=[],cur=null;
  lines.forEach(function(ln){
    if(/ESPELHO DO CART[ÃA]O DE PONTO/i.test(ln)){if(cur&&cur.id)blocos.push(cur);cur={dias:[],per:'',ref:'',id:'',nome:''};return}
    if(!cur)return;
    var m;
    if((m=ln.match(/Per[íi]odo\s+(\d{2}\/\d{2}\/\d{4})\s+a\s+(\d{2}\/\d{2}\/\d{4})\s*-\s*Ref\.?\s*([A-Z]{3}\/\d{4})/i))){cur.per=m[1]+' a '+m[2];cur.ref=m[3].toUpperCase();return}
    if((m=ln.match(/Matr[íi]cula:?\s*(\d{6,10})\s+Nome:?\s*(.+?)(?:\s+CNPJ|$)/i))){cur.id=m[1];cur.nome=m[2].trim();return}
    if((m=ln.match(RX_DIA))){
      var resto=m[3]||'';
      var phm=resto.match(/^([A-Z0-9]{3,5})\b/);
      var dNorm=m[1].length>8?(m[1].slice(0,6)+m[1].slice(8)):m[1]; // dd/mm/yyyy → dd/mm/yy (padrão interno)
      var dia={data:dNorm,dow:m[2],phtd:phm?phm[1]:'',marcas:[],contas:[]};
      var hm;RX_HORA.lastIndex=0;
      while((hm=RX_HORA.exec(resto)))dia.marcas.push(hm[1]);
      var cm;RX_CONTA.lastIndex=0;
      while((cm=RX_CONTA.exec(resto)))dia.contas.push({t:cm[1].trim(),v:cm[2].replace(',',':')});
      cur.dias.push(dia);return;
    }
    // linha de continuação de conta (sem data no início)
    if(cur.dias.length&&!/^PHTD|^_{5,}|^Supervis|^\(|^CNPJ|^Unidade|^Área|^Area|^Favor|^P[áa]gina|^\d{10,}/i.test(ln)){
      var cm2;RX_CONTA.lastIndex=0;var achou=false;
      while((cm2=RX_CONTA.exec(ln))){cur.dias[cur.dias.length-1].contas.push({t:cm2[1].trim(),v:cm2[2].replace(',',':')});achou=true}
    }
  });
  if(cur&&cur.id)blocos.push(cur);
  return blocos;
}

// classifica as horas de um dia
function calcDia(dia){
  var P=ROBO_PARAMS;
  var r={hn:0,he50:0,he100:0,he150:0,adn:0,trab:0,obs:[]};
  // horas trabalhadas pelas marcações (pares entrada/saída; vira a madrugada quando decresce)
  var ms=dia.marcas.map(hm2h);
  for(var i=0;i+1<ms.length;i+=2){
    var a=ms[i],b=ms[i+1];
    if(b<a)b+=24;                    // turno que cruza a meia-noite (CB81/82)
    if(b===24&&a<24)b=24;            // "24:00"
    r.trab+=b-a;
  }
  // contas oficiais do espelho
  var descontos=0;
  dia.contas.forEach(function(c){
    var t=normTxt(c.t),v=hm2h(c.v);
    if(P.contasHE150.some(function(x){return t.indexOf(normTxt(x))>=0})){r.he150+=v}
    else if(P.contasHE100.some(function(x){return t.indexOf(normTxt(x))>=0})){r.he100+=v}
    else if(P.contasHE50.some(function(x){return t.indexOf(normTxt(x))>=0})){r.he50+=v}
    else if(P.contasADN.some(function(x){return t.indexOf(normTxt(x))>=0})){r.adn+=v}
    else if(P.contasDesconto.some(function(x){return t.indexOf(normTxt(x))>=0})){if(c.v!=='1:00'||dia.marcas.length)descontos+=v;r.obs.push(c.t)}
  });
  // HN = trabalhado - extras já classificadas (nunca negativo)
  r.hn=Math.max(0,r.trab-(r.he50+r.he100+r.he150));
  // dia inteiro de falta/licença sem marcações → tudo zero
  if(!dia.marcas.length){r.hn=0;r.trab=0}
  ['hn','he50','he100','he150','adn','trab'].forEach(function(k){r[k]=Math.round(r[k]*100)/100});
  return r;
}

// ---------------------------------------------------------------------------
// PONTO MANUAL (FO-0140 "CARTÃO PONTO MANUAL") — cargos de confiança
// Supervisores / Engenheiro de Segurança / Coordenador etc. não batem ponto no
// RH (espelho sai zerado); as horas vêm deste formulário e são calculadas aqui.
// ---------------------------------------------------------------------------
// o pdf.js às vezes fragmenta números com espaços ("16/0 6 /2026", "1 6:00") — os padrões toleram isso
var RX_DIA_MANUAL=/^(\d(?:\s*\d)?)\s*\/\s*(\d(?:\s*\d)?)\s*\/\s*(\d(?:\s*\d){3})\s*(.*)$/;
var RX_HORA_MANUAL=/(\d(?:\s*\d)?)\s*:\s*(\d\s*\d)/g;
function semEsp(s){return String(s||'').replace(/\s+/g,'')}
function parseManualPonto(lines){
  var blocos=[],cur=null,pegandoNome=false;
  lines.forEach(function(ln){
    var m;
    // início de bloco: linha "Matrícula: NOME ... Cargo/Função: CARGO" (no FO-0140 o campo Matrícula traz o NOME)
    if((m=ln.match(/Matr[íi]cula:?\s*(.*?)\s*Cargo\/?\s*Fun[çc][ãa]o:?\s*(.+)$/i))){
      if(cur&&cur.dias.length)blocos.push(cur);
      cur={nome:m[1].trim(),cargo:m[2].trim(),ini:'',fim:'',dias:[]};
      pegandoNome=true;return;
    }
    if(!cur)return;
    if((m=ln.match(/In[íi]cio Ponto:?\s*([\d\s\/]+?)\s*Fim Ponto:?\s*([\d\s\/]+)$/i))){cur.ini=semEsp(m[1]);cur.fim=semEsp(m[2]);pegandoNome=false;return}
    if(/Centro Custo|^Turma|^Jornada|^Data\b|Estabelecimento|Assinatura|^FO\s*-|REVIS[ÃA]O|^P[ÁA]G|Manh[ãa]|Entrada/i.test(ln)){pegandoNome=false;/* segue */}
    else if(pegandoNome&&!RX_DIA_MANUAL.test(ln)&&/^[A-ZÀ-Ú ]{2,}$/.test(ln.trim())){cur.nome=(cur.nome+' '+ln.trim()).trim();return}
    if((m=ln.match(RX_DIA_MANUAL))){
      var horas=[],hm;RX_HORA_MANUAL.lastIndex=0;
      while((hm=RX_HORA_MANUAL.exec(m[4]))&&horas.length<6)horas.push(semEsp(hm[1])+':'+semEsp(hm[2]));
      var marcador=(m[4].match(/Domingo|S[áa]bado|F[ée]rias|Ferias|Falta|Atestado|Folga|DSR|Licen[çc]a|Afastad/i)||[null])[0];
      cur.dias.push({d:+semEsp(m[1]),mo:+semEsp(m[2]),y:+semEsp(m[3]),horas:horas,marcador:marcador});
    }
  });
  if(cur&&cur.dias.length)blocos.push(cur);
  // conserta datas com erro de digitação (ex.: "07/0/2026") pela sequência: dia anterior + 1
  blocos.forEach(function(b){
    var prev=null;
    b.dias.forEach(function(dia){
      var dt=new Date(dia.y,dia.mo-1,dia.d);
      var ruim=!dia.mo||dia.mo<1||dia.mo>12||!dia.d||dia.d>31||isNaN(dt.getTime())||dt.getDate()!==dia.d;
      if(ruim&&prev){dt=new Date(prev.getTime()+86400000)}
      if(prev&&!ruim){ // se saltou para trás, também usa sequência
        if(dt<=prev)dt=new Date(prev.getTime()+86400000);
      }
      dia.dt=dt;prev=dt;
    });
  });
  return blocos;
}
// sobreposição (em horas) do intervalo [a,b] com a janela noturna 22h–5h
function overlapNoturno(a,b){
  function ov(x1,x2,y1,y2){return Math.max(0,Math.min(x2,y2)-Math.max(x1,y1))}
  return ov(a,b,0,5)+ov(a,b,22,29); // [22,29] já cobre a madrugada de turnos que viram a meia-noite
}
// classifica um dia do ponto manual pelas regras editáveis
function calcManualDia(dia){
  var P=ROBO_PARAMS,r={hn:0,he50:0,he100:0,he150:0,adn:0,trab:0,obs:[]};
  if(dia.marcador)r.obs.push(dia.marcador);
  var hs=dia.horas.map(hm2h);
  for(var i=0;i+1<hs.length;i+=2){
    var a=hs[i],b=hs[i+1];if(b<a)b+=24;
    r.trab+=b-a;r.adn+=overlapNoturno(a,b);
  }
  if(r.trab>0){
    var dd=('0'+dia.dt.getDate()).slice(-2)+'/'+('0'+(dia.dt.getMonth()+1)).slice(-2)+'/'+dia.dt.getFullYear();
    var dow=dia.dt.getDay();
    var feriado=(P.feriados||[]).indexOf(dd)>=0;
    if(dow===0||feriado){r[P.manualHeDom||'he150']+=r.trab}
    else if(dow===6){r[P.manualHeSab||'he100']+=r.trab}
    else{
      var jorn=(dow===5)?(+P.manualJornSex||8):(+P.manualJornSegQui||9);
      r.hn=Math.min(r.trab,jorn);
      var extra=r.trab-r.hn;
      if(extra>0)r[P.manualHeUtil||'he50']+=extra;
    }
  }
  ['hn','he50','he100','he150','adn','trab'].forEach(function(k){r[k]=Math.round(r[k]*100)/100});
  return r;
}
function efetByNome(nome){
  var n=normTxt(nome);
  return ROBO_EFET.find(function(e){return normTxt(e.nome)===n})
      || ROBO_EFET.find(function(e){var x=normTxt(e.nome);return x.indexOf(n)===0||n.indexOf(x)===0});
}
var DOW_PT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
// processa um PDF de Ponto Manual já convertido em linhas
function processarManual(lines,file,st){
  var blocos=parseManualPonto(lines);
  if(!blocos.length)throw new Error('Nenhum cartão de ponto manual reconhecido em '+file.name);
  // reprocessamento idempotente: remove lançamentos anteriores deste mesmo arquivo
  ROBO_LANC=ROBO_LANC.filter(function(l){return l.arq!==file.name});
  var semCad=[],conflitos=0,totalDias=0,vistoNoArq={};
  blocos.forEach(function(b){
    var ef=efetByNome(b.nome);
    if(!ef)semCad.push(b.nome);
    var cargo=b.cargo||(ef?ef.cargo:'');
    var funcQ=ROBO_DEPARA[normTxt(cargo)]||ROBO_DEPARA[cargo]||'';
    var ref=b.fim?(['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'][+b.fim.slice(3,5)-1]+'/'+b.fim.slice(6)):'';
    b.dias.forEach(function(dia){
      var c=calcManualDia(dia);
      var d2=('0'+dia.dt.getDate()).slice(-2)+'/'+('0'+(dia.dt.getMonth()+1)).slice(-2)+'/'+String(dia.dt.getFullYear()).slice(-2);
      var nomeN=normTxt(ef?ef.nome:b.nome);
      // dedup dentro do próprio arquivo (cartão repetido/página re-escaneada): 1ª ocorrência vale
      var chave=nomeN+'|'+d2;
      if(vistoNoArq[chave])return;vistoNoArq[chave]=1;
      // guarda de duplicidade:
      // · linha MANUAL de outro arquivo no mesmo dia → substituível (a versão nova assume)
      // · linha do espelho RH com horas (trab/HE150/ADN) → o RH é oficial, o manual não entra
      // · linha do RH zerada (caso típico dos cargos de confiança) → substituída pelo manual
      var rhComHoras=false;
      ROBO_LANC=ROBO_LANC.filter(function(l){
        if(l.arq===file.name)return true;
        if(l.data===d2&&normTxt(l.nome)===nomeN){
          if(l.phtd==='MAN'||(l.obs||'').indexOf('PONTO MANUAL')===0)return false; // manual antigo sai
          if((+l.trab||0)>0||(+l.he150||0)>0||(+l.adn||0)>0){rhComHoras=true;return true}
          return false; // linha zerada do RH — o manual assume o dia
        }
        return true;
      });
      if(rhComHoras&&c.trab>0){conflitos++;return}
      ROBO_LANC.push({ref:ref,per:(b.ini||'')+' a '+(b.fim||''),data:d2,dow:DOW_PT[dia.dt.getDay()],phtd:'MAN',
        id:ef?ef.id:'',mat:ef?ef.mat:'',nome:ef?ef.nome:b.nome,cargo:cargo,funcQQP:funcQ,
        hn:c.hn,he50:c.he50,he100:c.he100,he150:c.he150,adn:c.adn,trab:c.trab,
        obs:('PONTO MANUAL'+(c.obs.length?' · '+c.obs.join('; '):'')),arq:file.name});
      totalDias++;
    });
  });
  ROBO_ARQS=ROBO_ARQS.filter(function(a){return a.nome!==file.name});
  ROBO_ARQS.unshift({nome:file.name,fid:file._fid||'',quando:new Date().toLocaleString('pt-BR'),colabs:blocos.length,dias:totalDias,ref:(blocos[0]&&blocos[0].fim)?('MANUAL '+blocos[0].fim.slice(3)):'MANUAL'});
  roboSave();
  rlog('Robô de Ponto','Ponto Manual',file.name+' → '+blocos.length+' colaboradores, '+totalDias+' dias');
  if(st)st.textContent='🖋 '+file.name+': '+blocos.length+' cartões manuais processados'+(semCad.length?(' · ⚠️ sem cadastro: '+semCad.join(', ')):'')+(conflitos?(' · '+conflitos+' dia(s) já tinham horas no RH (mantido o RH)'):'');
  return{colabs:blocos.length,semCad:semCad};
}

// processa PDFs do espelho → lançamentos
function roboProcessarPdf(file,statusEl){
  var st=function(m){if(statusEl)statusEl.textContent=m};
  st('Lendo '+file.name+'…');
  return file.arrayBuffer().then(function(buf){return pdfToLines(new Uint8Array(buf))})
  .then(function(res){
    var temTexto=res.lines.filter(function(l){return RX_DIA.test(l)||RX_DIA_MANUAL.test(l)}).length>3;
    if(temTexto)return res.lines;
    st('PDF sem texto — aplicando OCR (pode demorar)…');
    return pdfOcrLines(res.pdf,res.numPages,st);
  })
  .then(function(lines){
    // roteamento automático: formulário FO-0140 (Cartão Ponto Manual) tem parser e regras próprias
    if(lines.some(function(l){return /CART[ÃA]O PONTO MANUAL/i.test(l)})){
      return processarManual(lines,file,statusEl);
    }
    var blocos=parseEspelhos(lines);
    if(!blocos.length)throw new Error('Nenhum espelho reconhecido em '+file.name);
    var novos=0,semCad=[],pulados=0;
    blocos.forEach(function(b){
      // blindagem contra espelhos PARCIAIS antigos: se já existem MAIS dias carregados para este
      // colaborador+referência (vindos de outro arquivo), este arquivo é uma versão anterior — pula
      var jaTem=ROBO_LANC.filter(function(l){return l.id===b.id&&l.ref===b.ref&&l.phtd!=='MAN'&&l.arq!==file.name}).length;
      if(jaTem>b.dias.length){pulados++;return}
      var ef=efetById(b.id);
      if(!ef)semCad.push(b.id+' '+b.nome);
      var cargo=ef?ef.cargo:'(sem cadastro)';
      var funcQ=ROBO_DEPARA[normTxt(cargo)]||ROBO_DEPARA[cargo]||'';
      // remove lançamentos anteriores do mesmo colaborador+ref (reprocessamento idempotente)
      // — preservando os lançamentos do PONTO MANUAL (phtd 'MAN'), que têm fonte própria
      ROBO_LANC=ROBO_LANC.filter(function(l){return !(l.id===b.id&&l.ref===b.ref&&l.phtd!=='MAN')});
      b.dias.forEach(function(d){
        var c=calcDia(d);
        // convivência com o PONTO MANUAL no mesmo dia: RH zerado → o manual assume (não insere);
        // RH com horas → o RH é oficial (remove a linha manual do dia)
        var nomeN=normTxt(ef?ef.nome:b.nome);
        var manualJa=ROBO_LANC.some(function(l){return l.phtd==='MAN'&&l.data===d.data&&(l.id===b.id||normTxt(l.nome)===nomeN)});
        if(manualJa){
          if(c.trab<=0&&c.he150<=0)return;
          ROBO_LANC=ROBO_LANC.filter(function(l){return !(l.phtd==='MAN'&&l.data===d.data&&(l.id===b.id||normTxt(l.nome)===nomeN))});
        }
        ROBO_LANC.push({ref:b.ref,per:b.per,data:d.data,dow:d.dow,phtd:d.phtd,id:b.id,mat:ef?ef.mat:'',nome:ef?ef.nome:b.nome,cargo:cargo,funcQQP:funcQ,hn:c.hn,he50:c.he50,he100:c.he100,he150:c.he150,adn:c.adn,trab:c.trab,obs:c.obs.join('; '),arq:file.name});
      });
      novos++;
    });
    ROBO_ARQS=ROBO_ARQS.filter(function(a){return a.nome!==file.name});
    ROBO_ARQS.unshift({nome:file.name,fid:file._fid||'',quando:new Date().toLocaleString('pt-BR'),colabs:blocos.length,dias:blocos.reduce(function(s,b){return s+b.dias.length},0),ref:blocos[0].ref});
    roboSave();
    rlog('Robô de Ponto','Processar PDF',file.name+' → '+novos+' colaboradores');

    return{colabs:novos,semCad:semCad};
  });
}

// upload de Efetivos XLSX (atualiza cadastro)
function roboImportEfet(file){
  var fr=new FileReader();
  fr.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1});
      var out=[];
      rows.forEach(function(r,i){
        if(i===0||!r[0])return;
        out.push({id:String(r[0]).trim(),mat:String(r[1]||'').trim(),nome:String(r[2]||'').trim(),adm:'',cargo:String(r[5]||'').trim(),cc:String(r[6]||'').trim(),st:String(r[7]||'').trim()});
      });
      if(out.length<5)throw new Error('planilha não reconhecida');
      ROBO_EFET=out;roboSave();rlog('Robô de Ponto','Atualizar Efetivos',out.length+' colaboradores');
      rtoast('👷 Efetivos atualizado: '+out.length+' colaboradores');renderRobo();
    }catch(err){rtoast('Erro ao ler Efetivos: '+err.message)}
  };
  fr.readAsArrayBuffer(file);
}

function roboRefs(){var s={};ROBO_LANC.forEach(function(l){s[l.ref]=1});return Object.keys(s).sort()}
// ---- COMPETENCIA: ponto 16->15 | medicao 21->20 | Ref do espelho = mes da medicao ----
var MESES_ABREV={JAN:1,FEV:2,MAR:3,ABR:4,MAI:5,JUN:6,JUL:7,AGO:8,SET:9,OUT:10,NOV:11,DEZ:12};
function refInfo(ref){var p=String(ref||'').split('/');return{mes:MESES_ABREV[p[0]]||0,ano:parseInt(p[1])||0}}
function pad2(n){return String(n).padStart(2,'0')}
function compPeriodos(ref){var i=refInfo(ref);if(!i.mes)return null;var mA=i.mes===1?12:i.mes-1;
  return{ponto:'16/'+pad2(mA)+' a 15/'+pad2(i.mes),med:'21/'+pad2(mA)+' a 20/'+pad2(i.mes)}}
function refsDoFiltroGlobal(){
  try{
    if(typeof SM!=='undefined'&&SM&&SM.size>0){
      var ano=(typeof Y!=='undefined')?Y:null;
      return roboRefs().filter(function(r){var i=refInfo(r);return SM.has(i.mes)&&(!ano||!i.ano||i.ano===ano)});
    }
  }catch(e){}
  return roboRefs();
}
function roboRefAtivas(){

  if(v==='__auto__'||v==='')return refsDoFiltroGlobal();

}
// ---- MOTOR DE APURAÇÃO POR PERÍODO (dia a dia, independente do espelho de origem) ----
function dataBR(s){var p=String(s||'').split('/');var y=+p[2];if(y<100)y+=2000;return new Date(y,(+p[1])-1,+p[0])}
function fmtD(d){return pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+'/'+d.getFullYear()}
// período de apuração da MEDIÇÃO para uma competência (mes 1..12, ano)
// regra padrão (offset 0): competência JUL = apuração 21/06 a 20/07 (competência = mês do TÉRMINO);
// a nota fiscal dessa competência é emitida no mês seguinte (AGO)
function periodoDaCompetencia(mes,ano){
  var P=ROBO_PARAMS,off=(P.compOffset==null?0:+P.compOffset);
  var fimMes=mes-off,fimAno=ano;while(fimMes<1){fimMes+=12;fimAno--}while(fimMes>12){fimMes-=12;fimAno++}
  var iniMes=fimMes,iniAno=fimAno;
  if((+P.medIni)>(+P.medFim)){iniMes=fimMes-1;if(iniMes<1){iniMes=12;iniAno--}}
  var nfMes=fimMes+1,nfAno=fimAno;if(nfMes>12){nfMes=1;nfAno++}
  return{ini:new Date(iniAno,iniMes-1,+P.medIni),fim:new Date(fimAno,fimMes-1,+P.medFim),
         desc:pad2(+P.medIni)+'/'+pad2(iniMes)+'/'+iniAno+' a '+pad2(+P.medFim)+'/'+pad2(fimMes)+'/'+fimAno,
         nf:MESES_NOMES[nfMes]+'/'+nfAno};
}
var MESES_NOMES=['','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
// estado da UI de apuração (sobrevive aos re-renders)
var ROBO_UI=lsg('cbsi-v15-robo-ui',{modo:'comp',de:'',ate:'',ref:''});
